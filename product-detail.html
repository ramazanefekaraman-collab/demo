<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Shop | Produktdetaljer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="top">NIKE | PRODUKTDETALJER</div>

<div id="menu">
    <a href="index.html">Forside</a>
    <a href="produkter.html">Produkter</a>
    <a href="om.html">Om os</a>
    <a href="kontakt.html">Kontakt</a>
    <a href="admin.html">Admin</a>
</div>

<div id="indhold" class="detail-container">
    <div id="product-detail"></div>
    <div class="back-link">
        <a href="produkter.html" class="btn" style="background: #333;">← Tilbage til produkter</a>
    </div>
</div>

<div id="cart-sidebar">
    <h3>🛒 MIN KURV</h3>
    <div id="cart-items"></div>
    <div class="cart-total">Total: <span id="cart-total-price">0 kr</span></div>
    <button id="clear-cart-btn" class="btn-small">Tøm kurv</button>
    <a href="checkout.html" id="checkout-link" class="btn-small" style="display:block; text-align:center; margin-top:10px; background:red;">Gå til kassen</a>
</div>

<script src="data.js"></script>
<script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        if (productId) {
            renderProductDetail(productId);
        } else {
            document.getElementById('product-detail').innerHTML = '<p style="color:white;">Produkt ikke fundet.</p>';
        }
        updateCartUI();
    });
</script>
</body>
</html>
